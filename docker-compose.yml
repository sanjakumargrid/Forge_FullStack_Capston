services:

  # ── Infrastructure ────────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: forge-postgres
    environment:
      POSTGRES_USER: ${DB_USERNAME:-forge}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-forge_secure_123}
      POSTGRES_DB: auth_db
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: forge-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: forge-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-log:/var/lib/zookeeper/log

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: forge-kafka
    depends_on:
      - zookeeper
    ports:
      - "9094:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:29092 --list > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: forge-kafka-ui
    depends_on:
      - kafka
    ports:
      - "9095:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: forge-kafka
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  # ── Backend Services ──────────────────────────────────────────────────────────

  user-auth-service:
    build:
      context: ./Forge_backend/backend/user-auth-service
    container_name: forge-auth
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SERVER_PORT: 8081
      DB_URL: jdbc:postgresql://postgres:5432/auth_db
      DB_USERNAME: ${DB_USERNAME:-forge}
      DB_PASSWORD: ${DB_PASSWORD:-forge_secure_123}
      JWT_SECRET: ${JWT_SECRET:-forge-jwt-hmac-secret-key-must-be-at-least-256-bits-long-change-in-prod}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    ports:
      - "8085:8081"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/actuator/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 90s

  job-posting-service:
    build:
      context: ./Forge_backend/backend/job-posting-service
    container_name: forge-job-posting
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/job_posting_db
      DB_USERNAME: ${DB_USERNAME:-forge}
      DB_PASSWORD: ${DB_PASSWORD:-forge_secure_123}
      JWT_SECRET: ${JWT_SECRET:-forge-jwt-hmac-secret-key-must-be-at-least-256-bits-long-change-in-prod}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      AI_SERVICE_BASE_URL: ${AI_SERVICE_BASE_URL:-http://host.docker.internal:9999}
    ports:
      - "8082:8082"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8082/actuator/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 90s

  nginx-gateway:
    image: nginx:1.25-alpine
    container_name: forge-nginx
    depends_on:
      - user-auth-service
      - job-posting-service
    volumes:
      - ./Forge_backend/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8084:8080"

  # ── Frontend ──────────────────────────────────────────────────────────────────

  frontend:
    build:
      context: ./Forge_frontend
      dockerfile: Dockerfile
    container_name: forge-frontend
    ports:
      - "4200:4200"
      - "4201:4201"
      - "4202:4202"
      - "4203:4203"
      - "4204:4204"
      - "4205:4205"
      - "4206:4206"
      - "4207:4207"
      - "4208:4208"

volumes:
  postgres-data:
  zookeeper-data:
  zookeeper-log:
  kafka-data:
