events {
    worker_connections 1024;
}

http {
    # Echo the exact origin back if it is any localhost port
    map $http_origin $cors_origin {
        ~^http://localhost(:[0-9]+)?$  $http_origin;
        default                        "";
    }

    server {
        listen 8080;

        # ── Auth service ──────────────────────────────────────────────────────
        location /api/auth/ {
            # OPTIONS: return CORS preflight immediately (no upstream needed)
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin      $cors_origin;
                add_header Access-Control-Allow-Methods     "GET, POST, PUT, DELETE, OPTIONS";
                add_header Access-Control-Allow-Headers     "Authorization, Content-Type, X-User-Id, X-User-Role";
                add_header Access-Control-Allow-Credentials "true";
                add_header Access-Control-Max-Age           3600;
                return 204;
            }

            # Real requests: proxy, strip Spring CORS headers, add ours
            proxy_pass         http://user-auth-service:8081;
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   Origin          "";
            proxy_read_timeout 60s;

            proxy_hide_header  Access-Control-Allow-Origin;
            proxy_hide_header  Access-Control-Allow-Credentials;
            add_header         Access-Control-Allow-Origin      $cors_origin always;
            add_header         Access-Control-Allow-Credentials "true"        always;
        }

        # ── SSE stream: must not be buffered ─────────────────────────────────
        location /api/job-postings/public/events {
            proxy_pass         http://job-posting-service:8082;
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

            # SSE requires no buffering and a long read timeout
            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 3600s;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";

            add_header         Access-Control-Allow-Origin  $cors_origin always;
            add_header         Access-Control-Allow-Headers "Authorization, Content-Type" always;
            add_header         Cache-Control                no-cache      always;
        }

        # ── Job-posting service ───────────────────────────────────────────────
        location /api/ {
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin      $cors_origin;
                add_header Access-Control-Allow-Methods     "GET, POST, PUT, DELETE, OPTIONS";
                add_header Access-Control-Allow-Headers     "Authorization, Content-Type, X-User-Id, X-User-Role";
                add_header Access-Control-Allow-Credentials "true";
                add_header Access-Control-Max-Age           3600;
                return 204;
            }

            proxy_pass         http://job-posting-service:8082;
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;

            proxy_hide_header  Access-Control-Allow-Origin;
            proxy_hide_header  Access-Control-Allow-Credentials;
            add_header         Access-Control-Allow-Origin      $cors_origin always;
            add_header         Access-Control-Allow-Credentials "true"        always;
        }

        # ── Gateway health ────────────────────────────────────────────────────
        location /health {
            return 200 'ok\n';
            add_header Content-Type text/plain;
        }
    }
}
